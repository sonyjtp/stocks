name: Lint & Format Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: |
          flake8 backend --count --statistics --max-line-length=100 --extend-ignore=E203,W503
          echo "✓ flake8 passed"

      - name: Check black formatting
        run: |
          black --check backend --line-length=100
          echo "✓ black formatting check passed"

      - name: Check isort imports
        run: |
          isort --check-only --profile=black backend --line-length=100
          echo "✓ isort import check passed"

      - name: Run bandit security scan
        run: |
          bandit -r backend/app -ll -c .bandit
          echo "✓ bandit security scan passed"

      - name: Type check with mypy
        run: |
          mypy backend/app --ignore-missing-imports --no-error-summary 2>/dev/null || echo "⚠ mypy found issues (non-blocking)"
        continue-on-error: true
