name: Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: stocks_user
          POSTGRES_PASSWORD: stocks_password
          POSTGRES_DB: stocks_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 backend/app --max-line-length=100 --extend-ignore=E203,W503

      - name: Check formatting with black
        run: |
          black --check backend/app --line-length=100

      - name: Check imports with isort
        run: |
          isort --check-only --profile=black backend/app --line-length=100

      - name: Security check with bandit
        run: |
          bandit -r backend/app -c .bandit

      - name: Run tests with pytest
        run: |
          pytest backend/tests -v --cov=backend/app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check coverage
        run: |
          pytest backend/tests --cov=backend/app --cov-fail-under=85
