services:
  postgres:
    image: postgres:15-alpine
    container_name: stocks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stocks_user
      POSTGRES_PASSWORD: stocks_password
      POSTGRES_DB: stocks_db
    ports:
      - "5436:5432"
    volumes:
      - stocks_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stocks-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - stocks_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stocks_postgres_data:
    driver: local
  stocks_redis_data:
    driver: local
